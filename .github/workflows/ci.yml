name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Type check with pyright
        run: uv run pyright src/harvest_forecast

  unasync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Verify generated sync code matches async source
        run: python scripts/unasync.py --check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pip-audit
        run: uv run pip-audit

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unasync-check, test, security]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Check package contents
        run: |
          ls -la dist/
          uv run python -m tarfile -l dist/*.tar.gz
          uv run python -m zipfile -l dist/*.whl

      - name: Verify py.typed is in wheel
        run: |
          uv run python -m zipfile -l dist/*.whl | grep "py.typed"

      - name: Test installation from wheel
        run: |
          uv venv test-env
          uv pip install --python test-env/bin/python dist/*.whl
          cd /tmp && $GITHUB_WORKSPACE/test-env/bin/python -c "import harvest_forecast; print(harvest_forecast.__version__)"

      - name: Test installation from source distribution
        run: |
          uv venv test-src-env
          uv pip install --python test-src-env/bin/python dist/*.tar.gz
          cd /tmp && $GITHUB_WORKSPACE/test-src-env/bin/python -c "import harvest_forecast; print(harvest_forecast.__version__)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
