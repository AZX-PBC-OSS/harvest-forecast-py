name: Publish to PyPI

on:
  workflow_call:
    inputs:
      release_created:
        required: true
        type: boolean
      tag_name:
        required: true
        type: string
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: inputs.release_created || github.event_name == 'workflow_dispatch'
    environment:
      name: pypi
      url: https://pypi.org/project/harvest-forecast-py/

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Verify py.typed is in wheel
        run: |
          uv run python -m zipfile -l dist/*.whl | grep "py.typed"

      - name: Test installation from wheel
        run: |
          uv venv test-env
          uv pip install --python test-env/bin/python dist/*.whl
          cd /tmp && $GITHUB_WORKSPACE/test-env/bin/python -c "import harvest_forecast; print(harvest_forecast.__version__)"

      - name: Test installation from source distribution
        run: |
          uv venv test-src-env
          uv pip install --python test-src-env/bin/python dist/*.tar.gz
          cd /tmp && $GITHUB_WORKSPACE/test-src-env/bin/python -c "import harvest_forecast; print(harvest_forecast.__version__)"

      - name: Publish to PyPI
        run: uv publish
