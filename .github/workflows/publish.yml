name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag_name:
        description: Git tag to build and publish (e.g. v0.2.0)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to build and publish (e.g. v0.2.0)
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches project version
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
          DIST_NAME: harvest-forecast-py
        run: |
          set -euo pipefail
          tag="${TAG_NAME#v}"
          version="$(uv run python -c 'import importlib.metadata, os; print(importlib.metadata.version(os.environ["DIST_NAME"]))')"
          echo "Tag: ${tag}"
          echo "project version: ${version}"
          if [ "${tag}" != "${version}" ]; then
            echo "::error::Git tag ${tag} does not match project version ${version}"
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Smoke-test install from wheel
        env:
          DIST_NAME: harvest-forecast-py
        run: |
          uv venv test-env
          uv pip install --python test-env/bin/python dist/*.whl
          cd /tmp && $GITHUB_WORKSPACE/test-env/bin/python -c "import importlib.metadata, os; print(importlib.metadata.version(os.environ['DIST_NAME']))"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-dist
          path: dist/
          retention-days: 7

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/harvest-forecast-py/
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Off: when this workflow is called as a reusable workflow
          # (e.g. by release-please.yml), Sigstore records the caller's
          # top-level workflow, which PyPI cannot match to this repo's
          # trusted publisher.
          attestations: false
